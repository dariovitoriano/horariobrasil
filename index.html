<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sincronização de Fusos - Streaming Ready</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px; height: 720px; overflow: hidden;
            background: #000; font-family: 'Segoe UI', Arial, sans-serif;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
        }
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
        #foto-cidade { width: 100%; height: 100%; object-fit: cover; transition: opacity 1.5s ease; }
        .quadrante {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5);
        }
        .nome-fuso { font-size: 24px; letter-spacing: 4px; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        .hora { font-size: 100px; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
        
        /* Ocultar cursor para não aparecer no stream */
        body { cursor: none; }
    </style>
</head>
<body onload="configurarStream()">

    <div id="bg-container">
        <img id="foto-cidade" src="https://images.unsplash.com/photo-1543269664-76bc3997d9ea?w=1280" alt="Brasil">
    </div>

    <div class="quadrante">
        <div class="nome-fuso">FERNANDO DE NORONHA</div>
        <div id="fuso-noronha" class="hora">00:00:00</div>
    </div>
    <div class="quadrante">
        <div class="nome-fuso">HORÁRIO DE BRASÍLIA</div>
        <div id="fuso-brasilia" class="hora">00:00:00</div>
    </div>
    <div class="quadrante">
        <div class="nome-fuso">HORÁRIO DO AMAZONAS</div>
        <div id="fuso-amazonas" class="hora">00:00:00</div>
    </div>
    <div class="quadrante">
        <div class="nome-fuso">HORÁRIO DO ACRE</div>
        <div id="fuso-acre" class="hora">00:00:00</div>
    </div>

    <audio id="som-chuva" loop autoplay playsinline>
        <source src="https://www.soundjay.com/nature/rain-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        let offsetServidor = 0;
        let idxCidade = 0;
        const cidades = [
            "https://images.unsplash.com/photo-1601362840469-51e4d8d39785?w=1280",
            "https://images.unsplash.com/photo-1483729558449-99ef09a8c325?w=1280",
            "https://images.unsplash.com/photo-1543269664-76bc3997d9ea?w=1280"
        ];

        async function sincronizar() {
            try {
                // Sincronia com o tempo do Google (alternativa estável)
                const start = Date.now();
                const res = await fetch('https://worldtimeapi.org/api/timezone/America/Sao_Paulo');
                const data = await res.json();
                offsetServidor = new Date(data.datetime).getTime() - Date.now();
            } catch (e) { offsetServidor = 0; }
        }

        function atualizar() {
            const agora = new Date(Date.now() + offsetServidor);
            const fmt = (tz) => agora.toLocaleTimeString('pt-BR', {timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
            
            document.getElementById('fuso-noronha').innerText = fmt('Brazil/DeNoronha');
            document.getElementById('fuso-brasilia').innerText = fmt('America/Sao_Paulo');
            document.getElementById('fuso-amazonas').innerText = fmt('America/Manaus');
            document.getElementById('fuso-acre').innerText = fmt('America/Rio_Branco');
        }

        function alternarCidade() {
            const img = document.getElementById('foto-cidade');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = cidades[idxCidade];
                img.style.opacity = 0.2;
                idxCidade = (idxCidade + 1) % cidades.length;
            }, 1000);
        }

        function configurarStream() {
            sincronizar();
            setInterval(atualizar, 1000);
            setInterval(alternarCidade, 60000);
            
            const audio = document.getElementById('som-chuva');
            audio.volume = 0.5;

            // Tentativa agressiva de Play (para burlar o bloqueio de autoplay em servidores de stream)
            let forcePlay = setInterval(() => {
                audio.play().then(() => {
                    console.log("Áudio iniciado com sucesso!");
                    clearInterval(forcePlay);
                }).catch(() => {
                    console.log("Tentando liberar áudio...");
                });
            }, 500);
        }
    </script>
</body>
</html>
